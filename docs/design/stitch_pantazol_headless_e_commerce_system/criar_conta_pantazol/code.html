<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>pantazon - Cadastro de Cliente</title>

                    "tertiary-fixed": "#d5e3fc",
                    "secondary": "#565e74",
                    "on-tertiary-container": "#c7d6ee",
                    "on-surface": "#191c1e",
                    "surface-container": "#eceef0",
                    "inverse-surface": "#2d3133",
                    "tertiary": "#374559",
                    "surface-tint": "#2151da",
                    "surface-bright": "#f7f9fb",
                    "tertiary-fixed-dim": "#b9c7df",
                    "surface-container-high": "#e6e8ea",
                    "background": "#f7f9fb",
                    "surface-variant": "#e0e3e5",
                    "surface": "#f7f9fb",
                    "secondary-fixed": "#dae2fd",
                    "outline-variant": "#c4c5d7",
                    "tertiary-container": "#4f5d71",
                    "on-tertiary": "#ffffff",
                    "surface-container-highest": "#e0e3e5",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed-variant": "#3f465c",
                    "surface-dim": "#d8dadc",
                    "primary-fixed": "#dce1ff",
                    "primary": "#0037b0",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed": "#0d1c2e",
                    "on-primary-fixed": "#001551",
                    "secondary-container": "#dae2fd",
                    "primary-container": "#1d4ed8",
                    "primary-fixed-dim": "#b7c4ff",
                    "inverse-primary": "#b7c4ff",
                    "secondary-fixed-dim": "#bec6e0",
                    "on-secondary": "#ffffff",
                    "on-primary-container": "#cad3ff",
                    "on-secondary-container": "#5c647a",
                    "on-background": "#191c1e",
                    "on-surface-variant": "#434655",
                    "outline": "#747686",
                    "on-primary-fixed-variant": "#0039b5",
                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#eff1f3",
                    "on-secondary-fixed": "#131b2e",
                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "2xl": "48px",
                    "md": "16px",
                    "lg": "24px",
                    "container-max": "1280px",
                    "sm": "8px",
                    "base": "4px",
                    "gutter": "24px",

            "fontFamily": {

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .auth-card-shadow {
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.1), 0 2px 4px -2px rgba(15, 23, 42, 0.05);
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex items-center justify-center p-md">
<!-- Auth Layout Wrapper -->
<main class="w-full max-w-[480px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Header / Logo Area -->
<div class="text-center mb-xl">
<h1 class="text-headline-md font-headline-md font-bold text-primary mb-xs">pantazon</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Crie sua conta para começar a comprar</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-xl auth-card-shadow">
<form class="space-y-lg" id="registerForm">
<!-- Nome Completo -->
<div class="space-y-xs">
<label class="block text-label-md font-label-md text-on-surface" for="full_name">Nome Completo</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
<input class="w-full pl-[44px] pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="full_name" name="full_name" placeholder="João da Silva" required="" type="text"/>
</div>
</div>
<!-- E-mail -->
<div class="space-y-xs">
<label class="block text-label-md font-label-md text-on-surface" for="email">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full pl-[44px] pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="exemplo@email.com" required="" type="email"/>
</div>
</div>
<!-- Grid for Passwords on Desktop -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Senha -->
<div class="space-y-xs">
<label class="block text-label-md font-label-md text-on-surface" for="password">Senha</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-[44px] pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirmação de Senha -->
<div class="space-y-xs">
<label class="block text-label-md font-label-md text-on-surface" for="confirm_password">Confirmar Senha</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px]">lock_reset</span>
<input class="w-full pl-[44px] pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
<!-- Terms & Privacy -->
<div class="flex items-start gap-sm">
<input class="mt-[3px] h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary cursor-pointer" id="terms" name="terms" required="" type="checkbox"/>
<label class="text-body-sm font-body-sm text-on-surface-variant select-none cursor-pointer" for="terms">
                        Eu concordo com os <a class="text-primary hover:underline transition-all" href="#">Termos de Uso</a> e a <a class="text-primary hover:underline transition-all" href="#">Política de Privacidade</a> da pantazon.
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full py-md bg-primary text-on-primary font-label-md rounded-lg hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all flex items-center justify-center gap-sm shadow-sm" type="submit">
                    Criar conta
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer of the Card -->
<div class="mt-xl pt-lg border-t border-outline-variant text-center">
<p class="text-body-sm font-body-sm text-on-surface-variant">
                    Já possui uma conta? 
                    <a class="text-primary font-bold hover:underline ml-xs transition-all" href="#">Fazer login</a>
</p>
</div>
</div>
<!-- Trust Badges / Footer Info -->
<div class="mt-xl flex flex-col items-center gap-md opacity-60">
<div class="flex items-center gap-xl text-label-sm font-label-sm text-on-surface-variant">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
                    Seguro
                </div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">lock</span>
                    Encriptado
                </div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">support_agent</span>
                    Suporte 24h
                </div>
</div>
<p class="text-label-sm font-label-sm text-on-surface-variant">© 2024 pantazon E-Commerce. Todos os direitos reservados.</p>
</div>
</main>
<script>
        // Form Interaction Logic
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const submitBtn = this.querySelector('button[type="submit"]');

            if (password !== confirm) {
                alert('As senhas não coincidem!');
                return;
            }

            // Simple visual feedback for "loading" state
            const originalContent = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Criando conta...
            `;

            // Simulate API call
            setTimeout(() => {
                submitBtn.innerHTML = `
                    <span class="material-symbols-outlined text-[20px]">check_circle</span>
                    Conta Criada!
                `;
                submitBtn.classList.remove('bg-primary');
                submitBtn.classList.add('bg-green-600');
                
                setTimeout(() => {
                    alert('Bem-vindo à pantazon! Redirecionando...');
                    // In a real app: window.location.href = '/dashboard';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalContent;
                    submitBtn.classList.add('bg-primary');
                    submitBtn.classList.remove('bg-green-600');
                }, 1000);
            }, 1500);
        });

        // Floating label/focus effects if needed or purely relying on modern input behavior
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.previousElementSibling.classList.add('text-primary');
                input.previousElementSibling.classList.add('opacity-100');
            });
            input.addEventListener('blur', () => {
                input.previousElementSibling.classList.remove('text-primary');
                input.previousElementSibling.classList.remove('opacity-100');
            });
        });
    </script>
</body></html>
