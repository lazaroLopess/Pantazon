<script>
        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const isClosing = content.classList.contains('active');
            
            // Close all if we want restricted behavior, but here we just toggle
            content.classList.toggle('active');
            
            // Icon rotation logic for summary
            if(id === 'summary-details') {
                const icon = document.getElementById('summary-icon');
                icon.style.transform = isClosing ? 'rotate(0deg)' : 'rotate(180deg)';
            }
        }

        function goToStep(nextId, currentStepNum) {
            // Close current open sections
            const allAccordions = document.querySelectorAll('.accordion-content');
            allAccordions.forEach(acc => acc.classList.remove('active'));
            
            // Open next section
            const nextSection = document.getElementById(nextId);
            if(nextSection) nextSection.classList.add('active');

            // Mark current step as completed visually
            const currentCircle = document.getElementById(`circle-${currentStepNum}`) || document.querySelector('.bg-primary');
            if(currentCircle) {
                currentCircle.classList.remove('bg-surface-container', 'text-on-surface-variant');
                currentCircle.classList.add('bg-primary', 'text-white');
                currentCircle.innerHTML = '<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: \'wght\' 700;">check</span>';
            }

            // Scroll to next section smoothly
            setTimeout(() => {
                const target = document.getElementById(nextId).parentElement;
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        // Add input mask behavior simulation (optional micro-interactions)
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
                if(input.value) {
                    input.classList.add('border-primary/40');
                }
            });
        });
    </script>
